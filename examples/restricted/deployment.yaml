apiVersion: apps/v1
kind: Deployment
metadata:
  name: brute-research
  namespace: brute
  labels:
    app: brute-research
spec:
  replicas: 1
  selector:
    matchLabels:
      app: brute-research
  template:
    metadata:
      labels:
        app: brute-research
    spec:
      containers:
        - name: brute-research
          image: brute-local:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9292
              name: http
          env:
            - name: BRUTE_CWD
              value: "/workspace"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: brute-secrets
                  key: llm-api-key
                  optional: true
            - name: LLM_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: brute-secrets
                  key: llm-provider
                  optional: true
          livenessProbe:
            httpGet:
              path: /global/health
              port: 9292
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
              readOnly: true
      volumes:
        - name: workspace
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: brute-research
  namespace: brute
spec:
  selector:
    app: brute-research
  ports:
    - protocol: TCP
      port: 80
      targetPort: 9292
  type: ClusterIP
