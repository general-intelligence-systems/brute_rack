apiVersion: apps/v1
kind: Deployment
metadata:
  name: brute-multi
  namespace: brute
  labels:
    app: brute-multi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: brute-multi
  template:
    metadata:
      labels:
        app: brute-multi
    spec:
      containers:
        - name: brute-multi
          image: brute-local:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9292
              name: reader
            - containerPort: 9293
              name: coder
          env:
            - name: BRUTE_READER_CWD
              value: "/workspace/docs"
            - name: BRUTE_CODER_CWD
              value: "/workspace/project"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: brute-secrets
                  key: llm-api-key
                  optional: true
            - name: LLM_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: brute-secrets
                  key: llm-provider
                  optional: true
          livenessProbe:
            httpGet:
              path: /global/health
              port: 9292
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "400m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          volumeMounts:
            - name: docs
              mountPath: /workspace/docs
            - name: project
              mountPath: /workspace/project
      volumes:
        - name: docs
          emptyDir: {}
        - name: project
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: brute-reader
  namespace: brute
spec:
  selector:
    app: brute-multi
  ports:
    - protocol: TCP
      port: 80
      targetPort: 9292
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: brute-coder
  namespace: brute
spec:
  selector:
    app: brute-multi
  ports:
    - protocol: TCP
      port: 80
      targetPort: 9293
  type: ClusterIP
